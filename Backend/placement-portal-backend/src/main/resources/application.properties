spring.application.name=placement-portal-backend

# Force WebMVC as primary web layer (WebFlux WebClient used only for outbound email)
spring.main.web-application-type=servlet

# ??? Database ????????????????????????????????????????????????????????????????
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/placement_portal_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
server.port=${PORT:8080}

# ??? JPA ?????????????????????????????????????????????????????????????????????
# TODO: Switch back to 'validate' once Flyway migration support is restored for Spring Boot 4.x
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ??? Flyway ???????????????????????????????????????????????????????????????????
# Flyway autoconfiguration not available in Spring Boot 4.x ? disabled for now.
# Tables are managed by Hibernate ddl-auto=update until Flyway support is restored.
# WARNING: db/migration/ currently contains two files prefixed V2__
# (add_employer_location + create_profile_tables). Resolve the duplicate
# version before flipping spring.flyway.enabled=true.
spring.flyway.enabled=false
#spring.flyway.locations=classpath:db/migration
#spring.flyway.baseline-on-migrate=true
#spring.flyway.validate-on-migrate=true

# ??? JWT ?????????????????????????????????????????????????????????????????????
app.jwt.secret=${JWT_SECRET:n14mVo6e7M5WSJfg43uveaGLzIoZEdNVXdV4SZOEf7kCLJGqWWdBokFTu7804P3ikWc3tCvv3TNyYZElQ9X6bA==}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000
app.jwt.refresh-token-cookie-name=refreshToken

# ??? CORS ????????????????????????????????????????????????????????????????????
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ??? WebSocket ???????????????????????????????????????????????????????????????
app.websocket.endpoint=/ws
app.websocket.allowed-origins=http://localhost:4200

# ??? File Upload ?????????????????????????????????????????????????????????????
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.base-path=./uploads/resumes

# ??? Cache (Caffeine) ????????????????????????????????????????????????????????
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=300s

# ??? Rate Limiting ???????????????????????????????????????????????????????????
app.rate-limit.requests-per-minute=100
app.rate-limit.auth-requests-per-minute=20

# ??? Email (configure API key via env var in production) ?????????????????????
app.email.from-address=noreply@placementportal.edu
app.email.from-name=Placement Portal
app.email.provider-url=https://api.sendgrid.com/v3/mail/send
app.email.api-key=${EMAIL_API_KEY:dev-placeholder-key}

# ??? Logging ?????????????????????????????????????????????????????????????????
logging.level.com.placement.portal=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO